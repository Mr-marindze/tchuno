services:
  db-staging:
    image: postgres:16
    container_name: tchuno_db_staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tchuno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tchuno}
      POSTGRES_DB: ${POSTGRES_DB:-tchuno}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - tchuno_db_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tchuno} -d ${POSTGRES_DB:-tchuno}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  tchuno_db_staging_data:
