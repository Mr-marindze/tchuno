name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn from packageManager
        run: |
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Unit tests
        run: yarn test

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn from packageManager
        run: |
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: API coverage
        run: yarn workspace @tchuno/api test:cov

      - name: Upload API coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tchuno
          POSTGRES_PASSWORD: tchuno
          POSTGRES_DB: tchuno
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tchuno -d tchuno"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tchuno:tchuno@localhost:5432/tchuno?schema=public
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      WEB_ORIGIN: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn from packageManager
        run: |
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run API e2e tests
        run: yarn workspace @tchuno/api test:e2e
